version: '3.8'

services:
  vllm-gemma4-nvfp4:
    image: vllm-gemma4-nvfp4:latest
    container_name: vllm-gemma4-nvfp4
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
